name: CI - Training Tracker

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ./backend/Training-tracker-backend/Training-tracker-backend.sln

      - name: Build
        run: dotnet build ./backend/Training-tracker-backend/Training-tracker-backend.sln --no-restore

      - name: Run tests
        run: dotnet test ./backend/Training-tracker-backend/Training-tracker.UnitTests/Training-tracker.UnitTests.csproj --no-build --verbosity normal

